[package]
name = "x07-wasm"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"

[[bin]]
name = "x07-wasm"
path = "src/main.rs"

[dependencies]
anyhow = "1.0.86"
base64 = "0.22.1"
clap = { version = "4.5.4", features = ["derive"] }
hex = "0.4.3"
jsonschema = "0.38.1"
serde = { version = "1.0.203", features = ["derive"] }
serde_json = "1.0.117"
sha2 = "0.10.8"
time = { version = "0.3.36", features = ["std"] }
wasmparser = "0.224.0"
wasmtime = "36.0.4"
