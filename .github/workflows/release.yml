name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  verify_tag:
    name: verify-tag
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: x07lang/x07
          path: .release-tools
      - name: Verify tag matches crate version
        shell: bash
        run: |
          bash .release-tools/scripts/release/verify-tag.sh --repo-kind x07-wasm-backend --tag "${GITHUB_REF_NAME}"

  test:
    name: test
    needs: verify_tag
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install Linux deps
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            build-essential \
            pkg-config \
            libssl-dev \
            libcurl4-openssl-dev \
            liblzma-dev \
            zlib1g-dev \
            libsqlite3-dev \
            xz-utils
      - name: Install x07 (pinned tag)
        shell: bash
        run: |
          set -euo pipefail
          cargo install --locked --git https://github.com/x07lang/x07.git --tag v0.1.53 x07
          cargo install --locked --git https://github.com/x07lang/x07.git --tag v0.1.53 x07-host-runner
          x07 --version
      - name: Install wasmtime (pinned)
        shell: bash
        run: |
          set -euo pipefail
          V=42.0.0
          OS="linux"
          ARCH="x86_64"
          EXT="tar.xz"
          ASSET="wasmtime-v${V}-${ARCH}-${OS}.${EXT}"
          URL="https://github.com/bytecodealliance/wasmtime/releases/download/v${V}/${ASSET}"
          mkdir -p .wasmtime
          curl -fsSL --retry 10 --retry-connrefused --retry-all-errors --retry-delay 2 "$URL" -o ".wasmtime/wasmtime.${EXT}"
          tar -xJf ".wasmtime/wasmtime.${EXT}" -C .wasmtime
          wasmtime_dir="${PWD}/.wasmtime/wasmtime-v${V}-${ARCH}-${OS}"
          echo "${wasmtime_dir}" >> "${GITHUB_PATH}"
          export PATH="${wasmtime_dir}:${PATH}"
          wasmtime --version
      - name: Install component toolchain (pinned)
        shell: bash
        run: |
          set -euo pipefail
          cargo install --locked --version 1.245.1 wasm-tools
          cargo install --locked --version 0.53.1 wit-bindgen-cli
          cargo install --locked --version 0.9.0 wac-cli
          wasm-tools --version
          wit-bindgen --version
          wac --version
      - name: Install jco (pinned)
        shell: bash
        run: |
          set -euo pipefail
          npm install -g @bytecodealliance/jco@1.16.1
          jco --version
      - name: Run release gate
        shell: bash
        run: |
          bash scripts/ci/check_release_ready.sh

  build_matrix:
    name: build-${{ matrix.target }}
    needs:
      - verify_tag
      - test
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: x07lang/x07
          path: .release-tools
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install Linux deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends xz-utils
      - name: Build x07-wasm archive
        id: pack
        env:
          X07_RELEASE_TOOLS_DIR: ${{ github.workspace }}/.release-tools/scripts/release
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ASSET_PATH="$(bash scripts/release/build-wasm-archive.sh \
            --component x07-wasm \
            --version "${VERSION}" \
            --target "${{ matrix.target }}" \
            --out-dir dist/release)"
          echo "asset_path=${ASSET_PATH}" >> "$GITHUB_OUTPUT"
          echo "asset_name=$(basename "${ASSET_PATH}")" >> "$GITHUB_OUTPUT"
      - name: Attest built archive
        continue-on-error: true
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ steps.pack.outputs.asset_path }}
      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pack.outputs.asset_name }}
          path: ${{ steps.pack.outputs.asset_path }}
          if-no-files-found: error
          retention-days: 7

  finalize_release:
    name: finalize-release
    needs:
      - build_matrix
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: x07lang/x07
          path: .release-tools
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Download matrix artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true
      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          HOST_ABI_HASH="$(python3 - <<'PY'
          import json
          from pathlib import Path
          doc = json.loads(Path('vendor/x07-device-host/host_abi.snapshot.json').read_text(encoding='utf-8'))
          print(doc['host_abi_hash'])
          PY
          )"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "host_abi_hash=${HOST_ABI_HASH}" >> "$GITHUB_OUTPUT"
          echo "checksums=dist/release/x07-wasm-${VERSION}-checksums.txt" >> "$GITHUB_OUTPUT"
          echo "component_manifest=dist/release/x07-wasm-${VERSION}-release.json" >> "$GITHUB_OUTPUT"
          echo "attestations_jsonl=dist/release/x07-wasm-${VERSION}-attestations.jsonl" >> "$GITHUB_OUTPUT"
      - name: Export attestations bundle
        shell: bash
        run: |
          bash .release-tools/scripts/release/export-attestations-jsonl.sh \
            --in-dir dist/release \
            --out "${{ steps.meta.outputs.attestations_jsonl }}"
      - name: Generate checksums
        shell: bash
        run: |
          python3 .release-tools/scripts/release/gen-checksums.py \
            --in-dir dist/release \
            --out "${{ steps.meta.outputs.checksums }}"
      - name: Generate component release manifest
        shell: bash
        run: |
          python3 .release-tools/scripts/release/gen-component-release.py \
            --schema x07.component.release@0.1.0 \
            --component x07_wasm \
            --version "${{ steps.meta.outputs.version }}" \
            --tag "${GITHUB_REF_NAME}" \
            --repo "https://github.com/${GITHUB_REPOSITORY}" \
            --assets-dir dist/release \
            --compat-file "releases/compat/${{ steps.meta.outputs.version }}.json" \
            --metadata "host_abi_hash=sha256:${{ steps.meta.outputs.host_abi_hash }}" \
            --metadata "package_name=std-web-ui" \
            --metadata "package_version=0.1.5" \
            --out "${{ steps.meta.outputs.component_manifest }}"
      - name: Validate component release manifest
        shell: bash
        run: |
          python3 .release-tools/scripts/release/validate-json.py \
            --schema x07.component.release@0.1.0 \
            --in "${{ steps.meta.outputs.component_manifest }}" \
            --require component \
            --require version \
            --require assets \
            --require compatibility
      - name: Attest manifest assets
        continue-on-error: true
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            ${{ steps.meta.outputs.attestations_jsonl }}
            ${{ steps.meta.outputs.checksums }}
            ${{ steps.meta.outputs.component_manifest }}
      - name: Publish crate to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "CARGO_REGISTRY_TOKEN is not configured; skipping crates.io publish in GitHub Actions."
            exit 0
          fi
          cargo publish --locked -p x07-wasm
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --draft \
              --verify-tag \
              --title "${GITHUB_REF_NAME}"
          fi
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${GITHUB_REF_NAME}" dist/release/* \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
      - name: Publish immutable release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release edit "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --draft=false
